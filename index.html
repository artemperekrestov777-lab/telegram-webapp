<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacTabak</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f5f5f5;
        }

        .header {
            background: white;
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .categories {
            display: flex;
            overflow-x: auto;
            padding: 15px;
            gap: 10px;
            background: white;
            border-bottom: 1px solid #e0e0e0;
        }

        .categories::-webkit-scrollbar {
            display: none;
        }

        .category-btn {
            background: #f0f0f0;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            white-space: nowrap;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .category-btn.active {
            background: #333;
            color: white;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 15px;
        }

        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
        }

        .product-image {
            width: 100%;
            height: 150px;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }

        .product-info {
            padding: 12px;
        }

        .product-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .product-price {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .add-to-cart {
            width: 100%;
            background: #333;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
        }

        .nav-item {
            text-align: center;
            color: #666;
            font-size: 12px;
            cursor: pointer;
            padding: 5px;
        }

        .nav-item.active {
            color: #333;
        }

        .nav-icon {
            font-size: 20px;
            margin-bottom: 3px;
        }

        .cart-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: red;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cart-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: white;
            z-index: 1000;
            transform: translateY(100%);
            transition: transform 0.3s;
        }

        .cart-modal.active {
            transform: translateY(0);
        }

        .cart-header {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-content {
            padding: 15px;
            height: calc(100vh - 140px);
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .cart-item-image {
            width: 60px;
            height: 60px;
            background: #f0f0f0;
            border-radius: 8px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-total {
            padding: 15px;
            border-top: 1px solid #e0e0e0;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        .checkout-btn {
            width: 100%;
            background: #333;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .quantity-btn {
            width: 30px;
            height: 30px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">MacTabak</div>
    </div>

    <div class="categories" id="categories">
        <button class="category-btn active" onclick="filterCategory('all')">Все</button>
        <button class="category-btn" onclick="filterCategory('Снюс')">Снюс</button>
        <button class="category-btn" onclick="filterCategory('Наси')">Наси</button>
        <button class="category-btn" onclick="filterCategory('Арак')">Арак</button>
        <button class="category-btn" onclick="filterCategory('Насвар')">Насвар</button>
        <button class="category-btn" onclick="filterCategory('Снафф')">Снафф</button>
        <button class="category-btn" onclick="filterCategory('Курительный табак')">Курительный табак</button>
        <button class="category-btn" onclick="filterCategory('Самокруточный табак')">Самокруточный табак</button>
        <button class="category-btn" onclick="filterCategory('Нюхательный табак')">Нюхательный табак</button>
        <button class="category-btn" onclick="filterCategory('Махорка')">Махорка</button>
        <button class="category-btn" onclick="filterCategory('Кальянный табак')">Кальянный табак</button>
        <button class="category-btn" onclick="filterCategory('Жевательный табак')">Жевательный табак</button>
        <button class="category-btn" onclick="filterCategory('Трубочный табак')">Трубочный табак</button>
    </div>

    <div class="products" id="products"></div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="showHome()">
            <div class="nav-icon">🏠</div>
            <div>Главная</div>
        </div>
        <div class="nav-item" onclick="showOrders()">
            <div class="nav-icon">📦</div>
            <div>Заказы</div>
        </div>
        <div class="nav-item" onclick="showCart()" style="position: relative;">
            <div class="nav-icon">🛒</div>
            <div>Корзина</div>
            <span class="cart-badge" id="cartBadge" style="display: none;">0</span>
        </div>
        <div class="nav-item" onclick="showProfile()">
            <div class="nav-icon">👤</div>
            <div>Профиль</div>
        </div>
    </div>

    <div class="cart-modal" id="cartModal">
        <div class="cart-header">
            <h2>Корзина</h2>
            <button onclick="closeCart()" style="background: none; border: none; font-size: 24px;">×</button>
        </div>
        <div class="cart-content" id="cartContent">
            <p style="text-align: center; color: #999;">Корзина пуста</p>
        </div>
        <div class="cart-total">
            <span>Итого:</span>
            <span id="totalAmount">0 ₽</span>
        </div>
        <div style="padding: 15px;">
            <button class="checkout-btn" onclick="checkout()">Оформить заказ</button>
        </div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        // Товары (ВСЕ 42 товара из вашего списка)
        const products = [
            // Снюс
            { id: 1, name: "Odens Cold Dry", price: 350, category: "Снюс", emoji: "🟦" },
            { id: 2, name: "Siberia Red", price: 400, category: "Снюс", emoji: "🔴" },
            { id: 3, name: "Thunder Frosted", price: 380, category: "Снюс", emoji: "❄️" },
            { id: 4, name: "Lyft Freeze", price: 450, category: "Снюс", emoji: "⚪" },
            // Наси
            { id: 5, name: "Corvus Flash", price: 320, category: "Наси", emoji: "🟣" },
            { id: 6, name: "Corvus Logan", price: 340, category: "Наси", emoji: "🟢" },
            { id: 7, name: "Corvus Brutal", price: 360, category: "Наси", emoji: "⚫" },
            // Арак
            { id: 8, name: "Satyr High Aroma", price: 280, category: "Арак", emoji: "🟨" },
            { id: 9, name: "Satyr Medium", price: 260, category: "Арак", emoji: "🟧" },
            { id: 10, name: "Satyr Light", price: 240, category: "Арак", emoji: "🟩" },
            // Насвар
            { id: 11, name: "Khan Классический", price: 180, category: "Насвар", emoji: "🟫" },
            { id: 12, name: "Sultan Premium", price: 220, category: "Насвар", emoji: "🔶" },
            // Снафф
            { id: 13, name: "Poschl Gletscherprise", price: 280, category: "Снафф", emoji: "💨" },
            { id: 14, name: "Poschl Ozona", price: 260, category: "Снафф", emoji: "🌬️" },
            { id: 15, name: "McChrystal's Original", price: 300, category: "Снафф", emoji: "🌪️" },
            // Курительный табак
            { id: 16, name: "Camel Blue", price: 180, category: "Курительный табак", emoji: "🚬" },
            { id: 17, name: "Marlboro Red", price: 200, category: "Курительный табак", emoji: "🔴" },
            { id: 18, name: "Parliament Aqua", price: 210, category: "Курительный табак", emoji: "💙" },
            { id: 19, name: "Winston XS Blue", price: 170, category: "Курительный табак", emoji: "🔷" },
            // Самокруточный табак
            { id: 20, name: "Drum Original", price: 420, category: "Самокруточный табак", emoji: "📦" },
            { id: 21, name: "Golden Virginia", price: 480, category: "Самокруточный табак", emoji: "🟨" },
            { id: 22, name: "American Spirit", price: 520, category: "Самокруточный табак", emoji: "🦅" },
            // Нюхательный табак
            { id: 23, name: "Copenhagen Original", price: 380, category: "Нюхательный табак", emoji: "🇩🇰" },
            { id: 24, name: "Silver Dollar", price: 320, category: "Нюхательный табак", emoji: "💵" },
            { id: 25, name: "Toque Natural", price: 340, category: "Нюхательный табак", emoji: "🍃" },
            // Махорка
            { id: 26, name: "Махорка Крепкая", price: 120, category: "Махорка", emoji: "💪" },
            { id: 27, name: "Махорка Донская", price: 140, category: "Махорка", emoji: "🌾" },
            // Кальянный табак
            { id: 28, name: "Al Fakher Double Apple", price: 450, category: "Кальянный табак", emoji: "🍎" },
            { id: 29, name: "Adalya Love 66", price: 420, category: "Кальянный табак", emoji: "❤️" },
            { id: 30, name: "Darkside Core", price: 550, category: "Кальянный табак", emoji: "⚫" },
            { id: 31, name: "Tangiers Noir", price: 680, category: "Кальянный табак", emoji: "🌑" },
            { id: 32, name: "Fumari White Gummy", price: 520, category: "Кальянный табак", emoji: "🧸" },
            // Жевательный табак
            { id: 33, name: "Red Man Golden", price: 380, category: "Жевательный табак", emoji: "🥇" },
            { id: 34, name: "Levi Garrett", price: 360, category: "Жевательный табак", emoji: "🤠" },
            { id: 35, name: "Beech Nut Original", price: 340, category: "Жевательный табак", emoji: "🌰" },
            { id: 36, name: "Stoker's Apple", price: 320, category: "Жевательный табак", emoji: "🍏" },
            // Трубочный табак
            { id: 37, name: "Captain Black Royal", price: 480, category: "Трубочный табак", emoji: "👑" },
            { id: 38, name: "Davidoff English", price: 620, category: "Трубочный табак", emoji: "🎩" },
            { id: 39, name: "Dunhill Morning", price: 680, category: "Трубочный табак", emoji: "☀️" },
            { id: 40, name: "Peterson Irish Oak", price: 580, category: "Трубочный табак", emoji: "🍀" },
            { id: 41, name: "Mac Baren Original", price: 520, category: "Трубочный табак", emoji: "🔵" },
            { id: 42, name: "Savinelli Doblone", price: 560, category: "Трубочный табак", emoji: "🇮🇹" }
        ];

        let cart = [];
        let currentCategory = 'all';

        // Отображение товаров
        function displayProducts(category = 'all') {
            const productsDiv = document.getElementById('products');
            const filtered = category === 'all'
                ? products
                : products.filter(p => p.category === category);

            productsDiv.innerHTML = filtered.map(product => `
                <div class="product-card">
                    <div class="product-image">${product.emoji}</div>
                    <div class="product-info">
                        <div class="product-name">${product.name}</div>
                        <div class="product-price">${product.price} ₽</div>
                        <button class="add-to-cart" onclick="addToCart(${product.id})">В корзину</button>
                    </div>
                </div>
            `).join('');
        }

        // Фильтр категорий
        function filterCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            displayProducts(category);
        }

        // Добавление в корзину
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);

            if (existingItem) {
                existingItem.quantity++;
            } else {
                cart.push({...product, quantity: 1});
            }

            updateCartBadge();
            alert(`${product.name} добавлен в корзину`);
        }

        // Обновление счетчика корзины
        function updateCartBadge() {
            const badge = document.getElementById('cartBadge');
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);

            if (count > 0) {
                badge.style.display = 'flex';
                badge.textContent = count;
            } else {
                badge.style.display = 'none';
            }
        }

        // Показ корзины
        function showCart() {
            const modal = document.getElementById('cartModal');
            const content = document.getElementById('cartContent');

            if (cart.length === 0) {
                content.innerHTML = '<p style="text-align: center; color: #999;">Корзина пуста</p>';
            } else {
                content.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <div class="cart-item-image">${item.emoji}</div>
                        <div class="cart-item-info">
                            <div>${item.name}</div>
                            <div>${item.price} ₽</div>
                        </div>
                        <div class="quantity-controls">
                            <button class="quantity-btn" onclick="updateQuantity(${item.id}, -1)">−</button>
                            <span>${item.quantity}</span>
                            <button class="quantity-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
                        </div>
                    </div>
                `).join('');
            }

            updateTotal();
            modal.classList.add('active');
        }

        // Закрытие корзины
        function closeCart() {
            document.getElementById('cartModal').classList.remove('active');
        }

        // Обновление количества
        function updateQuantity(productId, change) {
            const item = cart.find(i => i.id === productId);
            if (item) {
                item.quantity += change;
                if (item.quantity <= 0) {
                    cart = cart.filter(i => i.id !== productId);
                }
                showCart();
                updateCartBadge();
            }
        }

        // Обновление суммы
        function updateTotal() {
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            document.getElementById('totalAmount').textContent = `${total} ₽`;
        }

        // Оформление заказа
        function checkout() {
            if (cart.length === 0) {
                alert('Корзина пуста');
                return;
            }

            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

            // Формируем данные заказа
            const orderData = {
                items: cart,
                total: total,
                timestamp: new Date().toISOString()
            };

            if (tg) {
                // Отправляем данные боту
                tg.sendData(JSON.stringify(orderData));
                tg.close();
            } else {
                alert(`Заказ на сумму ${total} ₽ оформлен!`);
                cart = [];
                updateCartBadge();
                closeCart();
            }
        }

        // Навигация
        function showHome() {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            event.currentTarget.classList.add('active');
            // Показываем главную
        }

        function showOrders() {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            event.currentTarget.classList.add('active');
            alert('История заказов');
        }

        function showProfile() {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            event.currentTarget.classList.add('active');
            alert('Профиль');
        }

        // Инициализация
        displayProducts();
    </script>
</body>
</html>
